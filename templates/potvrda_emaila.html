{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center pt-16 px-4">
    <div class="bg-gray-900/50 backdrop-blur-md p-10 rounded-2xl shadow-xl w-full max-w-md border border-white/5 text-center">
        
        <div class="flex justify-center mb-6">
            <div class="bg-green-500/20 text-green-500 p-4 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-12 h-12">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
                </svg>
            </div>
        </div>

        <h2 class="text-3xl font-black mb-4 tracking-tighter uppercase">Email <span class="text-green-500">Potvrđen</span></h2>
        <p class="text-gray-400 text-sm mb-8">Vaš nalog je uspešno aktiviran. Sada imate pun pristup Anivo platformi.</p>
        
        <a href="{{ url_for('login') }}" class="w-full inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-lg transition uppercase tracking-wider shadow-lg hover:shadow-indigo-500/20">
            Prijavi se odmah
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Supabase ostavlja token u linku nakon potvrde, ovo služi da očisti taj link da bi izgledao lepo
    if(window.location.hash) {
        window.history.replaceState(null, null, ' ');
    }
</script>
{% endblock %}
