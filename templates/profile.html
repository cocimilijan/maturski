{% extends 'base.html' %}
{% block content %}
<div class="pt-28 px-6 md:px-24 min-h-screen relative">
    
    {% if korisnik %}
    <div class="flex flex-col md:flex-row items-center md:items-end justify-between gap-6 mb-12">
        <div class="flex items-center gap-6">
            <img src="{{ url_for('static', filename='avatars/' + korisnik.avatar) }}" alt="Avatar" class="w-24 h-24 md:w-32 md:h-32 rounded-full object-cover border-4 border-indigo-500 shadow-xl transition-transform hover:scale-105 duration-300">
            <div>
                <h1 class="text-3xl md:text-5xl font-black text-white tracking-tighter uppercase">{{ korisnik.username }}</h1>
                <p class="text-gray-400 font-mono text-sm mt-1">{{ korisnik.email }}</p>
            </div>
        </div>
        <button onclick="toggleModal('settingsModal')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-full transition-all hover:scale-105 uppercase tracking-wider text-sm shadow-lg flex items-center gap-2 group">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 transition-transform duration-500 group-hover:rotate-90">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
            Izmeni Profil
        </button>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="settingsModalBox" class="bg-gray-900 border border-white/10 rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center p-6 border-b border-white/5 bg-gray-800/50">
                <h3 class="text-xl font-black uppercase tracking-widest">Podešavanja Profila</h3>
                <button onclick="toggleModal('settingsModal')" class="text-gray-400 hover:text-white text-2xl font-bold transition-transform hover:rotate-90">&times;</button>
            </div>
            
            <div class="p-6 md:p-8 flex flex-col gap-10">
                <form action="{{ url_for('update_profile') }}" method="POST" class="flex flex-col gap-4">
                    <h4 class="text-indigo-400 font-bold uppercase tracking-widest text-xs mb-2">Osnovni Podaci</h4>
                    
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="flex-1">
                            <label class="block text-gray-500 text-xs mb-1 uppercase tracking-wider">Korisničko ime</label>
                            <input type="text" name="username" value="{{ korisnik.username }}" class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-indigo-500 transition">
                        </div>
                        
                        <div class="flex-1">
                            <label class="block text-gray-500 text-xs mb-1 uppercase tracking-wider">Avatar</label>
                            <div class="flex items-center gap-3">
                                <img id="avatarPreview" src="{{ url_for('static', filename='avatars/' + korisnik.avatar) }}" alt="Preview" class="w-12 h-12 rounded-full border-2 border-indigo-500 object-cover shadow-md">
                                <select id="avatarSelect" name="avatar" onchange="azurirajPregled()" class="flex-1 bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-indigo-500 transition cursor-pointer">
    
    <option value="1.png" {% if korisnik.avatar == '1.png' %}selected{% endif %}>Anivo</option>
    <option value="2.png" {% if korisnik.avatar == '2.png' %}selected{% endif %}>Guts - BERSERK</option>
    <option value="3.png" {% if korisnik.avatar == '3.png' %}selected{% endif %}>Rabbit</option>
    <option value="4.png" {% if korisnik.avatar == '4.png' %}selected{% endif %}>Patrik KAUBOJ</option>
    <option value="5.png" {% if korisnik.avatar == '5.png' %}selected{% endif %}>Princeza</option>
    <option value="6.png" {% if korisnik.avatar == '6.png' %}selected{% endif %}>Dusko Dugousko</option>
    <option value="7.png" {% if korisnik.avatar == '7.png' %}selected{% endif %}>Tony Montana</option>
    <option value="8.png" {% if korisnik.avatar == '8.png' %}selected{% endif %}>Crtez MACKE</option>
    <option value="9.png" {% if korisnik.avatar == '9.png' %}selected{% endif %}>Fluttershy</option>
    <option value="10.png" {% if korisnik.avatar == '10.png' %}selected{% endif %}>Max Verstappen</option>

</select>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded text-sm w-fit transition mt-2 hover:shadow-lg hover:shadow-indigo-500/20">Sačuvaj izmene</button>
                </form>

                <form action="{{ url_for('change_password') }}" method="POST" class="flex flex-col gap-4 border-t border-white/5 pt-6">
                    <h4 class="text-red-400 font-bold uppercase tracking-widest text-xs mb-2">Sigurnost</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-gray-500 text-xs mb-1 uppercase tracking-wider">Stara Lozinka</label>
                            <input type="password" name="stara_lozinka" required class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-red-500 transition">
                        </div>
                        <div>
                            <label class="block text-gray-500 text-xs mb-1 uppercase tracking-wider">Nova Lozinka</label>
                            <input type="password" name="nova_lozinka" required minlength="6" class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-red-500 transition">
                        </div>
                        <div>
                            <label class="block text-gray-500 text-xs mb-1 uppercase tracking-wider">Potvrdi Novu</label>
                            <input type="password" name="potvrdi_lozinku" required minlength="6" class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-red-500 transition">
                        </div>
                    </div>
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded text-sm w-fit transition mt-2 hover:shadow-lg hover:shadow-red-500/20">Promeni lozinku</button>
                </form>
            </div>
        </div>
    </div>
    {% endif %}

    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 border-b border-white/10 pb-6 gap-6">
        <h2 class="text-4xl font-black border-l-4 border-indigo-500 pl-4 uppercase tracking-tighter">
            Moja <span class="text-indigo-500">Lista</span>
        </h2>
        
        <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto items-start md:items-center">
            
            <select id="sort-select" class="bg-black border border-gray-700 text-gray-300 text-xs font-bold rounded-lg p-2 outline-none focus:border-indigo-500 cursor-pointer">
                <option value="newest">Najnovije dodato</option>
                <option value="oldest">Najstarije dodato</option>
                <option value="rating_desc">Najbolje ocenjeno</option>
                <option value="rating_asc">Najslabije ocenjeno</option>
                <option value="title_asc">Abecedno (A-Z)</option>
                <option value="title_desc">Abecedno (Z-A)</option>
            </select>

            <div class="flex gap-2 overflow-x-auto pb-2 md:pb-0" id="filter-buttons">
                <button data-filter="all" class="filter-btn active bg-indigo-600 text-white text-xs font-bold px-4 py-2 rounded-full uppercase tracking-wider transition">Sve</button>
                <button data-filter="Odustao" class="filter-btn bg-gray-900 text-gray-400 hover:text-white text-xs font-bold px-4 py-2 rounded-full uppercase tracking-wider transition">Odustao</button>
                <button data-filter="Planiram" class="filter-btn bg-gray-900 text-gray-400 hover:text-white text-xs font-bold px-4 py-2 rounded-full uppercase tracking-wider transition">Planiram</button>
                <button data-filter="Gledam" class="filter-btn bg-gray-900 text-gray-400 hover:text-white text-xs font-bold px-4 py-2 rounded-full uppercase tracking-wider transition">Gledam</button>
                <button data-filter="Završeno" class="filter-btn bg-gray-900 text-gray-400 hover:text-white text-xs font-bold px-4 py-2 rounded-full uppercase tracking-wider transition">Završeno</button>
            </div>
        </div>
    </div>

    <div id="profile-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
    </div>

    <script id="user-list-data" type="application/json">
        {{ my_list | tojson | safe }}
    </script>
</div>
{% endblock %}
