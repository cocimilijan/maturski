{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center pt-16 px-4">
    <div class="bg-gray-900/50 backdrop-blur-md p-10 rounded-2xl shadow-xl w-full max-w-md border border-white/5">
        <h2 class="text-3xl font-black mb-2 text-center tracking-tighter uppercase">Obnova <span class="text-indigo-500">Lozinke</span></h2>
        <p class="text-center text-gray-400 text-sm mb-8">Unesite email adresu sa kojom ste kreirali nalog, a mi ćemo vam poslati link za promenu lozinke.</p>
        
        <form method="POST" action="{{ url_for('forgot_password') }}" class="flex flex-col gap-4">
            <div>
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-widest">Email adresa</label>
                <input type="email" name="email" required placeholder="vas@email.com" class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-indigo-500 transition">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded mt-4 transition uppercase tracking-wider hover:shadow-lg hover:shadow-indigo-500/20">
                Pošalji link
            </button>
        </form>
        
        <p class="text-center text-gray-500 text-sm mt-6">
            <a href="{{ url_for('login') }}" class="flex items-center justify-center gap-2 text-gray-400 hover:text-white transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
                Nazad na prijavu
            </a>
        </p>
    </div>
</div>
{% endblock %}
