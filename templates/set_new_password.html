{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center pt-16 px-4">
    <div class="bg-gray-900/50 backdrop-blur-md p-10 rounded-2xl shadow-xl w-full max-w-md border border-white/5" id="password-form-container" style="display: none;">
        <h2 class="text-3xl font-black mb-2 text-center tracking-tighter uppercase">Nova <span class="text-indigo-500">Lozinka</span></h2>
        <p class="text-center text-gray-400 text-sm mb-8">Unesite vašu novu, jaku lozinku ispod.</p>
        
        <form method="POST" action="{{ url_for('set_new_password') }}" class="flex flex-col gap-4">
            <input type="hidden" name="access_token" id="access_token">
            <input type="hidden" name="refresh_token" id="refresh_token">
            
            <div>
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-widest">Nova Lozinka (Min. 8)</label>
                <input type="password" name="nova_lozinka" required minlength="8" class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-widest">Potvrdi Novu Lozinku</label>
                <input type="password" name="potvrdi_lozinku" required minlength="8" class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-indigo-500 transition">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded mt-4 transition uppercase tracking-wider hover:shadow-lg hover:shadow-indigo-500/20">
                Sačuvaj Lozinku
            </button>
        </form>
    </div>

    <div id="loading-msg" class="text-center text-gray-400 text-lg font-bold animate-pulse">
        Proveravanje bezbednosnog linka...
    </div>
    
    <div id="error-msg" class="text-center text-red-500 text-lg font-bold" style="display: none;">
        Neispravan ili istekao link za resetovanje. <br> <a href="{{ url_for('forgot_password') }}" class="text-indigo-400 underline mt-2 inline-block">Zatražite novi link.</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');
        const type = params.get('type');

        if (accessToken && refreshToken && type === 'recovery') {
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('access_token').value = accessToken;
            document.getElementById('refresh_token').value = refreshToken;
            document.getElementById('password-form-container').style.display = 'block';
        } else {
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
        }
    });
</script>
{% endblock %}
