{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center pt-16 px-4">
    <div class="bg-gray-900/50 backdrop-blur-md p-10 rounded-2xl shadow-xl w-full max-w-md border border-white/5">
        <h2 class="text-3xl font-black mb-6 text-center tracking-tighter uppercase">Nova <span class="text-indigo-500">Registracija</span></h2>
        
        <form method="POST" action="{{ url_for('register') }}" class="flex flex-col gap-4">
            <div>
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-widest">Email adresa</label>
                <input type="email" name="email" required class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-widest">Lozinka (Min. 8)</label>
                <input type="password" name="password" required minlength="8" class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-widest">Potvrdi Lozinku</label>
                <input type="password" name="confirm_password" required minlength="8" class="w-full bg-black border border-gray-700 rounded p-3 text-white outline-none focus:border-indigo-500 transition">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded mt-4 transition uppercase tracking-wider hover:shadow-lg hover:shadow-indigo-500/20">
                Kreiraj nalog
            </button>
        </form>
        <p class="text-center text-gray-500 text-sm mt-6">Već imate nalog? <a href="{{ url_for('login') }}" class="text-indigo-400 hover:text-white transition font-bold">Prijavite se</a></p>
    </div>
</div>
{% endblock %}
